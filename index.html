<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATENA CONCURSOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/quill@1.3.7/dist/quill.snow.css">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              slate: {
                950: '#020617',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar for Elite Feel - Polished */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #020617; /* Slate 950 */
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b; /* Slate 800 */
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d97706; /* Amber 600 (formerly Emerald 600) */
      }
      
      /* Utility for custom internal scrollbars */
      .custom-scrollbar::-webkit-scrollbar {
          width: 4px;
          height: 4px;
      }

      /* Quill Dark Mode & Layout Adjustments */
      .dark .ql-toolbar {
          background-color: #1e293b;
          border-color: #334155 !important;
      }
      
      /* Quill Layout Fix: Internal Scrolling */
      .quill {
          display: flex;
          flex-direction: column;
          border-radius: 0.5rem;
      }

      .ql-toolbar {
          background: white;
          border-top-left-radius: 0.5rem;
          border-top-right-radius: 0.5rem;
          flex-shrink: 0;
          border-bottom: 1px solid #ccc;
      }

      .dark .ql-toolbar {
          background-color: #1e293b;
      }

      .ql-container {
          flex: 1;
          border-bottom-left-radius: 0.5rem;
          border-bottom-right-radius: 0.5rem;
          min-height: 200px;
          display: flex;
          flex-direction: column;
          overflow: hidden !important;
      }

      .ql-editor {
          flex: 1;
          overflow-y: auto !important;
          min-height: 200px;
      }

      .dark .ql-container {
          background-color: #0f172a;
          border-color: #334155 !important;
          color: #f1f5f9;
      }
      .dark .ql-stroke {
          stroke: #94a3b8 !important;
      }
      .dark .ql-fill {
          fill: #94a3b8 !important;
      }
      .dark .ql-picker {
          color: #94a3b8 !important;
      }
      .dark .ql-picker-options {
          background-color: #1e293b !important;
          border-color: #334155 !important;
      }
    </style>
